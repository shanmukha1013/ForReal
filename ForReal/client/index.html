<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Primary Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00FF88" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="ForReal — raw debates, real voices, no filters. Join the future of authentic social debates." />
    <meta name="keywords" content="social media, debates, talks, real voices, ForReal, community, credibility" />
    <meta name="author" content="ForReal" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://forreal.app/" />
    <meta property="og:title" content="ForReal — We Don’t Talk Shit." />
    <meta property="og:description" content="Authentic debates. Real people. No filters. Enter the arena." />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://forreal.app/" />
    <meta property="twitter:title" content="ForReal — Raw. Real. Unfiltered." />
    <meta property="twitter:description" content="Join the debate revolution. Create talks, challenge ideas, build credibility." />
    <meta property="twitter:image" content="/twitter-image.png" />
    
    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="style" href="/src/index.css" />
    <link rel="preload" as="script" href="/src/main.jsx" />
    
    <!-- Title -->
    <title>ForReal — Talk. Debate. Be Real.</title>
    
    <!-- Inline style to prevent FOUC and provide minimal loading indicator -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000000;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: #ffffff;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      /* Optional: subtle loading indicator while React boots */
      .loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        border: 3px solid rgba(0, 255, 136, 0.2);
        border-top-color: #00FF88;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      /* Hide indicator once React mounts (React will remove or overwrite content) */
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-indicator"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
