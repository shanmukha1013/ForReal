<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon & Brand Icons — custom FR monogram (F white, R green) -->
    <link rel="icon" type="image/x-icon"   href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="wfFnYAlMV-GvLFVxlfd28zhOafYDus1gTBvpeaZfo0w" />

    <!-- Primary Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#22C55E" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="ForReal is a modern social platform for authentic conversations, communities, discussions, and meaningful connections." />
    <meta name="keywords" content="social platform, communities, conversations, discussions, ForReal, authentic, real connections, social media" />
    <meta name="author" content="ForReal" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://forreal.app/" />
    <meta property="og:title" content="ForReal - Real Conversations, Real Communities" />
    <meta property="og:description" content="ForReal is a social platform for authentic conversations, real debates, and meaningful communities. Join the discussion without the noise." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="ForReal" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://forreal.app/" />
    <meta property="twitter:title" content="ForReal - Real Conversations, Real Communities" />
    <meta property="twitter:description" content="ForReal is a social platform for authentic conversations, real debates, and meaningful communities. Join the discussion without the noise." />
    <meta property="twitter:image" content="/twitter-image.png" />
    <meta name="twitter:creator" content="@forreal" />
    
    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="style" href="/src/index.css" />
    <link rel="preload" as="script" href="/src/main.jsx" />
    
    <!-- Title -->
    <title>ForReal - Real Conversations, Real Communities</title>
    
    <!-- Inline style to prevent FOUC and provide minimal loading indicator -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000000;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: #ffffff;
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      /* Optional: subtle loading indicator while React boots */
      .loading-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        border: 3px solid rgba(0, 255, 136, 0.2);
        border-top-color: #00FF88;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
      /* Hide indicator once React mounts (React will remove or overwrite content) */
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-indicator"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
